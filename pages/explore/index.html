<script>
var placeData = {
  stjohns: {
    title: "St John's — Tynwald Hill",
    events: [
      { date: "c.979", text: "First recorded Tynwald assembly at a site the Manx already considered sacred. The Norse built their parliament where the island's people already gathered.", chapter: "Ch 2", url: "/endnotes/part-1/chapter-2/" },
      { date: "1417", text: "The laws of Mann codified at Tynwald for the first time. What had been remembered was now written down.", chapter: "Ch 3", url: "/endnotes/part-1/chapter-3/" },
      { date: "1764", text: "The Keys meet at Tynwald, pass their resolution against the sale, and send Cosnahan to London. They are silenced. The petition goes nowhere.", chapter: "Ch 7", url: "/endnotes/part-1/chapter-7/" },
      { date: "1765", text: "The Revestment proclaimed at Tynwald Hill. Sovereignty transferred from the Duke of Atholl to the Crown. The same hill, the same ceremony, a different master.", chapter: "Ch 11", url: "/endnotes/part-2/chapter-11/" }
    ]
  },
  douglas: {
    title: "Douglas",
    events: [
      { date: "1750s", text: "George Moore's merchant voyages from Douglas harbour — brandy, spirits, linen. Traders from Spain, Portugal, France, the Netherlands. A cosmopolitan port.", chapter: "Ch 6", url: "/endnotes/part-1/chapter-6/" },
      { date: "1750s", text: "Quayle's Bank, the Peggy yacht, the Bridge House merchant network. The commercial families of Douglas at the height of their prosperity.", chapter: "Ch 6", url: "/endnotes/part-1/chapter-6/" },
      { date: "1765+", text: "The warehouses emptied, merchants fleeing. Robertson records \"universal terror\" at the news of what Parliament had done.", chapter: "Ch 14", url: "/endnotes/part-3/chapter-14/" },
      { date: "1771", text: "The Keys' petition to Parliament: families \"reduced to the utmost Extremity of Despair are daily removing themselves & families & going to Foreign Kingdoms to seek a Livelihood.\"", chapter: "Ch 14", url: "/endnotes/part-3/chapter-14/" }
    ]
  },
  castletown: {
    title: "Castletown — Castle Rushen",
    events: [
      { date: "1405", text: "The Stanleys take possession of the Island. Castle Rushen becomes the seat of the Lords of Mann — a role it holds for three and a half centuries.", chapter: "Ch 3", url: "/endnotes/part-1/chapter-3/" },
      { date: "1651", text: "Countess Charlotte holds the castles against Parliamentarian forces. The siege of Castle Rushen — the last Royalist stronghold in the British Isles to surrender.", chapter: "Ch 4", url: "/endnotes/part-1/chapter-4/" },
      { date: "1765", text: "The garrison arrives. Troops with bayonets at the old capital. Three volleys fired. Governor Wood reads the proclamation.", chapter: "Ch 11", url: "/endnotes/part-2/chapter-11/" },
      { date: "1766+", text: "Governor Wood administers the Island from Castletown — unpaid for nine years. The Crown's indifference made personal.", chapter: "Ch 12", url: "/endnotes/part-2/chapter-12/" }
    ]
  },
  peel: {
    title: "Peel — St Patrick's Isle",
    events: [
      { date: "c.500", text: "Early Christian settlement on St Patrick's Isle. The keeill tradition begins here — small chapels built at community scale, often near pre-existing holy wells.", chapter: "Ch 1", url: "/endnotes/part-1/chapter-1/" },
      { date: "1698", text: "Bishop Wilson arrives on the Island. The beginning of a fifty-seven-year episcopate that would define Mann's spiritual and educational life.", chapter: "Ch 4", url: "/endnotes/part-1/chapter-4/" },
      { date: "1765+", text: "The herring fleet declines. The harbour infrastructure rots. The fishermen who depended on it are left without safe anchorage.", chapter: "Ch 14", url: "/endnotes/part-3/chapter-14/" }
    ]
  },
  ramsey: {
    title: "Ramsey",
    events: [
      { date: "1079", text: "Godred Crovan lands at Ramsey with his fleet. He fights three battles before he takes the Island and founds the sea kingdom of Mann and the Isles.", chapter: "Ch 2", url: "/endnotes/part-1/chapter-2/" },
      { date: "1700s", text: "Northern trading port and part of the running trade network across the Irish Sea. Ships moving between Mann, Whitehaven, Liverpool, Dublin.", chapter: "Ch 5", url: "/endnotes/part-1/chapter-5/" },
      { date: "1765+", text: "Harbour neglect. The infrastructure falls into the gap between Duke and Crown — neither responsible, both extracting.", chapter: "Ch 14", url: "/endnotes/part-3/chapter-14/" }
    ]
  },
  hangoe: {
    title: "Hango Hill, Castletown",
    events: [
      { date: "1663", text: "Illiam Dhone executed. William Christian — the man who had surrendered the Island to Parliamentarian forces to spare Manx lives — shot by firing squad on the hill above Castletown. The parish register records his burial the same day.", chapter: "Ch 4", url: "/endnotes/part-1/chapter-4/" }
    ]
  },
  onchan: {
    title: "Onchan",
    events: [
      { date: "1700s", text: "The Christian family church. Fletcher Christian was baptised here — the family web connecting through generations to Bligh, the Bounty, and the mutiny that would make the name famous far from the Island.", chapter: "Ch 6", url: "/endnotes/part-1/chapter-6/" }
    ]
  },
  maughold: {
    title: "Kirk Maughold",
    events: [
      { date: "c.900s", text: "The Maughold crosses. Norse and Celtic craftsmanship side by side in the same churchyard — the accommodation carved in stone. Each tradition enriching the other rather than replacing it.", chapter: "Ch 2", url: "/endnotes/part-1/chapter-2/" }
    ]
  },
  andreas: {
    title: "Kirk Andreas",
    events: [
      { date: "c.900s", text: "Thorwald's Cross — Odin and Christ on the same stone. The old religion and the new, not in conflict but in conversation. The church also holds the only zodiac rose window in a British church outside Cambridgeshire.", chapter: "Ch 2", url: "/endnotes/part-1/chapter-2/" }
    ]
  },
  snaefell: {
    title: "Snaefell",
    events: [
      { date: "", text: "The highest point on the Island. On a clear day you can see seven kingdoms — England, Ireland, Scotland, Wales, Mann, the sea, and heaven. The physical island that shaped everything that followed.", chapter: "Ch 1", url: "/endnotes/part-1/chapter-1/" }
    ]
  },
  ronaldsway: {
    title: "Ronaldsway",
    events: [
      { date: "1651", text: "The Parliamentarian forces land on the southern plain. Illiam Dhone negotiates the surrender — choosing to save Manx lives rather than hold out for a lord who was already defeated.", chapter: "Ch 4", url: "/endnotes/part-1/chapter-4/" }
    ]
  },
  cregneash: {
    title: "Cregneash",
    events: [
      { date: "1800s+", text: "The last Manx-speaking community. The language survived longest here in the south, carried by people who never stopped using it. What London never knew about, London could not take.", chapter: "Ch 16", url: "/endnotes/part-3/chapter-16/" }
    ]
  },
  porterin: {
    title: "Port Erin",
    events: [
      { date: "1787", text: "The storm that killed fishermen. The harbour decay after the Revestment was not an abstraction — it had lethal consequences. Men drowned because the infrastructure that should have protected them had been allowed to rot.", chapter: "Ch 15", url: "/endnotes/part-3/chapter-15/" }
    ]
  },
  laxey: {
    title: "Laxey",
    events: [
      { date: "1700s", text: "Eastern fishing port and part of the herring fleet network. The boats that sailed from here fed families across the Island.", chapter: "Ch 5", url: "/endnotes/part-1/chapter-5/" }
    ]
  }
};

function showPlace(placeId) {
  var data = placeData[placeId];
  if (!data) return;

  document.getElementById('detail-prompt').style.display = 'none';
  var content = document.getElementById('detail-content');
  content.style.display = 'block';

  document.getElementById('detail-title').textContent = data.title;

  var eventsHtml = '';
  for (var i = 0; i < data.events.length; i++) {
    var ev = data.events[i];
    eventsHtml += '<div class="event-item">';
    eventsHtml += '<div class="event-date">' + ev.date + '</div>';
    eventsHtml += '<div class="event-body">';
    eventsHtml += '<div class="event-text">' + ev.text + '</div>';
    eventsHtml += '<div class="event-chapter"><a href="' + ev.url + '">' + ev.chapter + ' — Find out more</a></div>';
    eventsHtml += '</div></div>';
  }
  document.getElementById('detail-events').innerHTML = eventsHtml;

  // Highlight active dot
  var dots = document.querySelectorAll('.place-dot');
  for (var j = 0; j < dots.length; j++) {
    dots[j].classList.toggle('active', dots[j].getAttribute('data-place') === placeId);
  }

  // On mobile, scroll to detail panel
  if (window.innerWidth <= 768) {
    content.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Attach click handlers to dots
var dots = document.querySelectorAll('.place-dot');
for (var i = 0; i < dots.length; i++) {
  dots[i].addEventListener('click', function() {
    showPlace(this.getAttribute('data-place'));
  });
}
</script>
